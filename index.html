<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能家居监控系统 - 巴法云</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            background-color: #f5f5f5;
        }
        h1 {
            color: #333;
            text-align: center;
            border-bottom: 2px solid #4CAF50;
            padding-bottom: 10px;
        }
        .card {
            background-color: white;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .sensor-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }
        .sensor-item {
            background-color: #f9f9f9;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }
        .sensor-label {
            font-size: 14px;
            color: #666;
            margin-bottom: 5px;
        }
        .sensor-value {
            font-size: 24px;
            font-weight: bold;
            color: #333;
        }
        .unit {
            font-size: 14px;
            color: #999;
            margin-left: 2px;
        }
        .status-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #eee;
        }
        .status-label {
            font-weight: 500;
            color: #555;
        }
        .status-value {
            padding: 3px 10px;
            border-radius: 15px;
            font-size: 14px;
            font-weight: 500;
        }
        .status-on {
            background-color: #4CAF50;
            color: white;
        }
        .status-off {
            background-color: #f44336;
            color: white;
        }
        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        .btn-on {
            background-color: #4CAF50;
            color: white;
        }
        .btn-on:hover {
            background-color: #45a049;
        }
        .btn-off {
            background-color: #f44336;
            color: white;
        }
        .btn-off:hover {
            background-color: #da190b;
        }
        .btn:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
        }
        .update-time {
            text-align: center;
            color: #999;
            font-size: 12px;
            margin-top: 20px;
        }
        .warning {
            background-color: #fff3cd;
            border: 1px solid #ffeeba;
            color: #856404;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 20px;
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>🏠 智能家居监控系统</h1>
    
    <!-- 配置提示区（用户需要填写自己的UID） -->
    <div class="warning" id="configWarning">
        ⚠️ 请先在代码中填写你的巴法云私钥(UID)
    </div>

    <!-- 传感器数据卡片 -->
    <div class="card">
        <h2>📊 传感器数据</h2>
        <div class="sensor-grid">
            <div class="sensor-item">
                <div class="sensor-label">🌡️ 温度</div>
                <div class="sensor-value" id="tempValue">--<span class="unit">°C</span></div>
            </div>
            <div class="sensor-item">
                <div class="sensor-label">💧 湿度</div>
                <div class="sensor-value" id="humValue">--<span class="unit">%</span></div>
            </div>
            <div class="sensor-item">
                <div class="sensor-label">👤 红外</div>
                <div class="sensor-value" id="pirValue">--</div>
            </div>
            <div class="sensor-item">
                <div class="sensor-label">🌱 土壤湿度</div>
                <div class="sensor-value" id="soilValue">--</div>
            </div>
        </div>
    </div>

    <!-- 执行器状态卡片 -->
    <div class="card">
        <h2>🔧 执行器状态</h2>
        <div class="status-row">
            <span class="status-label">💡 LED灯</span>
            <span class="status-value" id="ledStatus">未知</span>
        </div>
        <div class="status-row">
            <span class="status-label">🔒 电磁锁</span>
            <span class="status-value" id="lockStatus">未知</span>
        </div>
        <div class="status-row">
            <span class="status-label">🔊 喇叭</span>
            <span class="status-value" id="buzzerStatus">未知</span>
        </div>
    </div>

    <!-- 控制面板卡片 -->
    <div class="card">
        <h2>🎮 远程控制</h2>
        
        <h3>💡 LED灯 (LgWwNYApS002)</h3>
        <div class="button-group">
            <button class="btn btn-on" onclick="sendCommand('LgWwNYApS002', 'on')">开灯</button>
            <button class="btn btn-off" onclick="sendCommand('LgWwNYApS002', 'off')">关灯</button>
        </div>
        
        <h3>🔒 电磁锁 (WIthdrcPm001)</h3>
        <div class="button-group">
            <button class="btn btn-on" onclick="sendCommand('WIthdrcPm001', 'on')">开锁</button>
            <button class="btn btn-off" onclick="sendCommand('WIthdrcPm001', 'off')">关锁</button>
        </div>
        
        <h3>🔊 喇叭 (vzMBEfoi7003)</h3>
        <div class="button-group">
            <button class="btn btn-on" onclick="sendCommand('vzMBEfoi7003', 'on')">开启喇叭</button>
            <button class="btn btn-off" onclick="sendCommand('vzMBEfoi7003', 'off')">关闭喇叭</button>
        </div>
    </div>

    <!-- 更新时间 -->
    <div class="update-time" id="updateTime">最后更新: --</div>

    <script>
        // ========== 配置区：请修改为你的信息 ==========
        const UID = "ed8d3eae4fc74bfe94ae3a972a1060f2";  // 替换成你的UID
        const TOPIC_SENSOR = "wYQn2CCUp004";  // 传感器主题
        
        // 注意：控制主题已经在按钮的onclick中直接使用，不需要在这里额外配置
        // ============================================

        // 显示/隐藏配置警告
        if (UID === "你的巴法云私钥" || UID === "") {
            document.getElementById('configWarning').style.display = 'block';
        } else {
            document.getElementById('configWarning').style.display = 'none';
        }

        /**
         * 获取传感器数据
         * 巴法云HTTP API: http://api.bemfa.com/api/device/v1/data/1/{UID}/{topic}/
         * 参考：https://cloud.bemfa.com/docs/src/api_device.html [citation:8]
         */
        async function fetchData() {
            try {
                const url = `https://apis.bemfa.com/va/getmsg?uid=${UID}&topic=${TOPIC_SENSOR}&type=1`;
                const response = await fetch(url);
                const data = await response.json();
                
                if (data.code === 0 && data.data.length > 0) {
            	const lastMsg = data.data[0].msg;
            	let obj;
            	if (typeof lastMsg === 'string') {
                	obj = JSON.parse(lastMsg);
            	} else {
                	obj = lastMsg;
            	}
                    
                    // 更新传感器显示
                    document.getElementById('tempValue').innerHTML = obj.temp + '<span class="unit">°C</span>';
                    document.getElementById('humValue').innerHTML = obj.hum + '<span class="unit">%</span>';
                    document.getElementById('pirValue').innerText = obj.pir ? "有人" : "无人";
                    document.getElementById('soilValue').innerText = obj.soil;
                    
                    // 更新执行器状态显示
                    updateStatusBadge('ledStatus', obj.led);
                    updateStatusBadge('lockStatus', obj.lock);
                    updateStatusBadge('buzzerStatus', obj.buzzer);
                    
                    // 更新时间
                    const now = new Date();
                    document.getElementById('updateTime').innerText = `最后更新: ${now.toLocaleTimeString()}`;
                } else {
                    console.error("获取数据失败:", data);
                }
            } catch (error) {
                console.error("请求错误:", error);
            }
        }

        /**
         * 更新状态徽章的样式和文字
         */
        function updateStatusBadge(elementId, value) {
            const element = document.getElementById(elementId);
            if (value === 1 || value === true) {
                element.innerText = "开启";
                element.className = "status-value status-on";
            } else {
                element.innerText = "关闭";
                element.className = "status-value status-off";
            }
        }

        /**
         * 发送控制指令
         * 巴法云HTTP API (POST): http://api.bemfa.com/api/device/v1/data/1/{UID}/{topic}/
         * 参考：https://cloud.bemfa.com/docs/src/api_device.html [citation:1][citation:2][citation:4]
         */
        async function sendCommand(topic, command) {
            // 临时禁用按钮防止重复点击
            const buttons = document.querySelectorAll('button');
            buttons.forEach(btn => btn.disabled = true);
            
            try {
                const url = `https://apis.bemfa.com/va/sendMessage?uid=${UID}&topic=${topic}&type=1&msg=${command}`;
                console.log("发送请求:", url); // 调试时可以看看 URL 是否正确
		const response = await fetch(url);
                if (!response.ok) {
            	throw new Error(`HTTP错误，状态码: ${response.status}`);
        	}
		const result = await response.json();
                console.log("发送结果:", result);
                
                if (result.code === 0) {
                    // 发送成功，稍后刷新数据
                    setTimeout(fetchData, 1000);
                } else {
                    alert(`发送失败: ${result.message || '未知错误'}`);
                }
            } catch (error) {
                console.error("发送错误:", error);
                alert("网络错误，请检查控制台");
            } finally {
                // 恢复按钮
                setTimeout(() => {
                    buttons.forEach(btn => btn.disabled = false);
                }, 2000);
            }
        }

        // 页面加载完成后立即获取一次数据
        window.onload = function() {
            if (UID !== "你的巴法云私钥" && UID !== "") {
                fetchData();
                // 每3秒自动刷新数据 [citation:7]
                setInterval(fetchData, 3000);
            }
        };
    </script>
</body>
</html>
